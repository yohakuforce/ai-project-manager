name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  PYTHON_VERSION: "3.12"
  GITLEAKS_VERSION: "8.21.2"

jobs:
  lint-and-type:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Ruff (format check)
        run: ruff format --check src tests

      - name: Mypy (strict on new modules — blocking)
        run: mypy src/infrastructure/notifiers

      - name: Mypy (advisory full src — v0 cleanup tracking)
        run: mypy src || echo "::warning::v0 既存コードに型エラーあり（cleanup task で解消予定）"

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests -W error::RuntimeWarning

      - name: Upload coverage XML
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] pip-audit

      - name: Bandit
        run: bandit -r src -c pyproject.toml

      - name: pip-audit
        run: |
          pip install -r requirements.txt
          pip-audit --skip-editable || echo "::warning::pip-audit found vulnerabilities (review required)"

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # gitleaks-action はライセンス（GITLEAKS_LICENSE）必須になったため、
      # ライセンス不要の OSS CLI を直接インストールして実行する。
      - name: Install gitleaks CLI
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan for secrets
        run: gitleaks dir . --redact --no-banner
